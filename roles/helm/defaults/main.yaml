---
helm_version: "v4.0.0"
helm_os: "{{ ansible_system | lower }}"
helm_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: arm

helm_arch: "{{ helm_arch_map[ansible_architecture] | default(ansible_architecture) }}"
helm_download_url: "https://get.helm.sh/helm-{{ helm_version }}-{{ helm_os }}-{{ helm_arch }}.tar.gz"
helm_install_dir: "/usr/local/bin"

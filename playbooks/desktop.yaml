---
- name: Play to set the desired state on desktops
  hosts: localhost
  gather_facts: true
  become: true
  remote_user: coen
  vars:
    ansible_config_path: "/home/{{ username }}/.ansible.cfg"
    bashrc_path: "/home/{{ username }}/.bashrc"

  tasks:
    - name: Wait until apt/dpkg locks are free (e.g. unattended-upgrades)
      ansible.builtin.command: fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/lib/apt/lists/lock
      register: apt_lock_check
      changed_when: false
      failed_when: false
      until: apt_lock_check.rc != 0
      retries: 60
      delay: 10

    - name: Ensure ANSIBLE_CONFIG is exported in .bashrc
      ansible.builtin.blockinfile:
        path: "{{ bashrc_path }}"
        block: |
          export ANSIBLE_CONFIG="{{ ansible_config_path }}"
        marker: "# {mark} managed by Ansible"
      become: false

    - name: Apply common role
      ansible.builtin.import_role:
        name: common
      become: true

    - name: Install Visual Studio Code
      ansible.builtin.import_role:
        name: vscode
      become: true

    - name: Install common packages
      ansible.builtin.package:
        name:
          - curl
          - jq
          - nano
          - adb
          - open-iscsi
          - xfsprogs
        state: present

    - name: Install Flatpak
      ansible.builtin.import_role:
        name: flatpak
      become: true

    - name: Install Bitwarden Desktop
      ansible.builtin.import_role:
        name: bitwarden-desktop

    - name: Uninstall apt packages
      ansible.builtin.package:
        name:

          - gnome-contacts
          - gnome-characters
        state: absent

    - name: Configure mountpoints
      ansible.builtin.include_role:
        name: mountpoints

    - name: Install libreoffice
      ansible.builtin.include_role:
        name: libreoffice

    - name: Install librewolf
      ansible.builtin.import_role:
        name: librewolf
      become: true

    - name: Install helm
      ansible.builtin.import_role:
        name: helm

    - name: Configure git
      ansible.builtin.import_role:
        name: git
      become: true

    - name: Install Ansible lint
      ansible.builtin.import_role:
        name: ansible-lint
      become: true

    - name: Install kubectl
      ansible.builtin.import_role:
        name: kubectl
      become: true

    - name: Install kubeseal
      ansible.builtin.import_role:
        name: kubeseal
      become: true

    - name: Configure argocd-cli
      ansible.builtin.import_role:
        name: argocd-cli
      become: true

    - name: Install Slack
      ansible.builtin.import_role:
        name: slack
      become: true

    - name: Install calendar
      ansible.builtin.import_role:
        name: calendar
      become: true

    - name: Install contacts
      ansible.builtin.import_role:
        name: contacts
      become: true

    - name: Setup NTP
      ansible.builtin.import_role:
        name: ntp
      become: true

    - name: Install Podman
      ansible.builtin.import_role:
        name: podman
      become: true

    - name: Install CA trust certificate
      ansible.builtin.import_role:
        name: ca_trust
      become: false

